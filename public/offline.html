<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — KasuwaAI</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f5f2eb; color: #1a1a1a; padding: 24px; box-sizing: border-box;
      }
      @media (prefers-color-scheme: dark) { body { background: #0f0e0c; color: #f2efe9; } }
      .card { max-width: 22rem; text-align: center; }
      .mark { width: 56px; height: 56px; border-radius: 14px; background: #c8f23a; display: inline-flex; align-items: center; justify-content: center; }
      h1 { font-size: 1.35rem; margin: 20px 0 8px; }
      p { margin: 0 0 20px; opacity: 0.7; line-height: 1.5; }
      button {
        appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
        background: #0a0a0a; color: #fff; padding: 12px 22px; border-radius: 12px;
      }
      @media (prefers-color-scheme: dark) { button { background: #c8f23a; color: #0a0a0a; } }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="mark" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 13 L16 6.5 L26 13 Z" fill="#0a0a0a" />
          <rect x="7.5" y="14.5" width="17" height="2.4" rx="1.2" fill="#0a0a0a" />
          <rect x="9" y="18.4" width="3" height="7" rx="1.2" fill="#0a0a0a" />
          <rect x="14.5" y="18.4" width="3" height="7" rx="1.2" fill="#0a0a0a" />
          <rect x="20" y="18.4" width="3" height="7" rx="1.2" fill="#0a0a0a" />
        </svg>
      </span>
      <h1>You're offline</h1>
      <p>KasuwaAI needs a connection to load your latest sales and debts. Check your network and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
